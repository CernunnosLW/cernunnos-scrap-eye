  { name:"Punch Holes", icon:"🔨", guidance:"Pricking iron first, then awl to open each hole. Work on poundo board — foam lets holes drift off-angle." },
  { name:"Glue", icon:"🧴", guidance:"Roughen both surfaces. Let contact cement flash off until tacky before pressing — it bonds on first touch." },
  { name:"Stitch", icon:"🧵", guidance:"Saddle stitch locks each stitch — far stronger than machine. Consistent tension matters more than speed." },
  { name:"Dye", icon:"🎨", guidance:"Case veg tan before dyeing for even absorption. Build colour in thin layers, seal with resist coat afterwards." },
  { name:"Edge Coat", icon:"〰️", guidance:"Sand through 120→240 grit first. 2–3 thin coats of edge paint, letting each dry. Buff with canvas for gloss." },
  { name:"Burnish", icon:"🪵", guidance:"Dampen edge with water or gum tragacanth. Rub firmly with a wooden slicker — friction seals the fibres." },
  { name:"Condition", icon:"✨", guidance:"Thin coats only, let absorb fully before buffing. One coat is usually enough for new work." },
  { name:"Hardware", icon:"🔩", guidance:"Test fit before setting permanently. Always set on a solid steel block, never on wood." },
  { name:"Final Check", icon:"☑️", guidance:"Stitches, edges, hardware, finish, closures — inspect under raking light. This step is most often rushed." },
];

const buildPrompt = (materials) => {
  const textMaterials = materials.filter(m => !m.photoBase64).map((m, i) =>

  const photoMaterials = materials.filter(m => m.photoBase64).map((m, i) =>
    `Photo ${i + 1}${m.description ? ` (described as: ${m.description})` : ""}`
  ).join("\n");

  return `You are an expert leatherworker with 20 years of experience. A maker has shown you their available leather materials${photoMaterials ? ` in photos (${photoMaterials})` : ""}${textMaterials ? ` and described some pieces in text:\n${textMaterials}` : ""}.

Your job is to suggest creative, practical projects they could make from these specific materials — including projects that cleverly combine multiple pieces.

Return ONLY valid JSON — no preamble, no markdown, no backticks:

{
  "materials_read": [
    {
      "label": "<short label like 'Piece A' or 'Photo 1'>",
      "description": "<what you see or were told: leather type, colour, estimated size, thickness if visible, quality notes>",
      "best_for": "<what this piece is best suited for in one short phrase>"
    }
  ],
  "projects": [
    {
      "name": "<project name>",
      "emoji": "<single relevant emoji>",
      "headline": "<one punchy sentence selling this idea>",
      "uses_materials": ["<label of material used, e.g. 'Piece A'>"],
      "skill_level": "<Beginner | Intermediate | Advanced>",
      "estimated_time": "<e.g. '1–2 hours'>",
      "sells_for": "<realistic UK price range e.g. '£25–£45'>",
      "why_these_materials": "<one sentence on why this combination or piece works for this project>",
      "key_steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", "<step 5>"],
      "pro_tip": "<one actionable tip from an expert>",
      "difficulty_notes": "<honest note on the trickiest part>"
    }
  ],
  "makers_note": "<one warm, encouraging sentence about the quality or potential of what you see overall>"
}

Suggest between 3 and 6 projects. Prioritise projects that:
1. Actually fit the material sizes you can see or that were described
2. Use materials in combination where that makes sense
3. Range from quick wins (30 min) to a satisfying longer build
4. Are realistic for a home workshop maker

Be specific about which material goes where. If you can see sizes, use them. If not, work from what's described.`;
};

function ScanOverlay() {
  const [pos, setPos] = useState(0);
  const msgs = ["Reading grain patterns…", "Estimating dimensions…", "Identifying leather types…", "Thinking of project ideas…", "Almost there…"];
  const [mIdx, setMIdx] = useState(0);
  useEffect(() => {
    const a = setInterval(() => setPos(p => (p + 1.2) % 100), 18);

    return () => { clearInterval(a); clearInterval(m); };
  }, []);
  return (
    <div style={{ position:"absolute", inset:0, borderRadius:12, overflow:"hidden", background:"rgba(20,4,0,0.22)", display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
      <div style={{ position:"absolute", left:0, right:0, top:`${pos}%`, height:2, background:`linear-gradient(90deg,transparent,${C.burnished}CC,transparent)`, boxShadow:`0 0 12px ${C.burnished}88` }}/>
      {[[{top:8,left:8},{borderTop:`2px solid ${C.burnished}`,borderLeft:`2px solid ${C.burnished}`}],[{top:8,right:8},{borderTop:`2px solid ${C.burnished}`,borderRight:`2px solid ${C.burnished}`}],[{bottom:8,left:8},{borderBottom:`2px solid ${C.burnished}`,borderLeft:`2px solid ${C.burnished}`}],[{bottom:8,right:8},{borderBottom:`2px solid ${C.burnished}`,borderRight:`2px solid ${C.burnished}`}]].map(([p,b],i)=>(

  );
}

/* ══════════════════════════════════════════════════════════
   SESSION BUILDER (main compose screen)
══════════════════════════════════════════════════════════ */
function SessionBuilder({ materials, onAddPhoto, onAddText, onUpdate, onDelete, onAnalyse, analysing }) {
  const hasAny = materials.length > 0;
  const hasDesc = materials.some(m => m.description.trim().length > 2);
  const canAnalyse = hasAny && hasDesc;

  return (
    <div>
      <SectionHeading
        children="What have you got?"
        sub="Add your leather pieces — photos, descriptions, or both. Mix and match however works."
      />

      {/* Add buttons */}
      <div style={{ display:"flex", gap:8, marginBottom:18 }}>
        <button onClick={onAddPhoto} style={{ flex:1, border:`2px dashed ${C.borderSoft}`, borderRadius:12, padding:"14px 8px", cursor:"pointer", background:"transparent", fontFamily:"inherit", textAlign:"center", transition:"all 0.2s" }}>
          <div style={{ fontSize:24, marginBottom:5 }}>📷</div>
          <div style={{ fontSize:12, fontWeight:700, color:C.ink }}>Add Photo</div>
          <div style={{ fontSize:10, color:C.faded, marginTop:2 }}>Camera or gallery</div>
        </button>
        <button onClick={onAddText} style={{ flex:1, border:`2px dashed ${C.borderSoft}`, borderRadius:12, padding:"14px 8px", cursor:"pointer", background:"transparent", fontFamily:"inherit", textAlign:"center", transition:"all 0.2s" }}>
          <div style={{ fontSize:24, marginBottom:5 }}>✏️</div>
          <div style={{ fontSize:12, fontWeight:700, color:C.ink }}>Describe a Piece</div>
          <div style={{ fontSize:10, color:C.faded, marginTop:2 }}>No photo needed</div>
        </button>
      </div>

      {/* Material list */}
      {materials.length === 0 ? (
        <EmptyState icon="🪡" heading="No materials added yet" sub={`Add a photo of your leather pile, describe pieces by hand, or do both — then tap "What can I make?" to get ideas.`}/>
      ) : (
        materials.map((m, i) => (
          <MaterialCard key={m.id} mat={m} index={i} onUpdate={onUpdate} onDelete={onDelete}/>
        ))
      )}

      {/* Analyse button */}
      {hasAny && (
        <div style={{ marginTop:8 }}>
          {!hasDesc && (
            <div style={{ fontSize:12, color:C.amber, fontWeight:600, textAlign:"center", marginBottom:10 }}>
              Add a description to at least one material to continue
            </div>
          )}
          <Btn
            onClick={onAnalyse}
            disabled={!canAnalyse || analysing}
            style={{ width:"100%", fontSize:16, padding:"15px 0" }}
            variant="gold"
          >
            {analysing ? "Reading your leather…" : `✦ What can I make from ${materials.length} piece${materials.length !== 1 ? "s" : ""}?`}
          </Btn>
          {analysing && (
            <div style={{ textAlign:"center", fontSize:11, color:C.bark, marginTop:8 }}>
              Claude is examining your materials and thinking up ideas…
            </div>
          )}
        </div>
      )}
    </div>
  );
}

        </div>
      ))}

      <Divider/>
      <Btn onClick={onReset} variant="secondary" style={{ width:"100%" }}>↩ Start a new session</Btn>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════════ */
function ScrapEye() {
  const [splashDone, setSplashDone] = useState(false);
  const [phase, setPhase] = useState("build"); // build | results | project
  const [materials, setMaterials] = useState([]);
  const [analysing, setAnalysing] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [viewingProject, setViewingProject] = useState(null);
  const [analysisImages, setAnalysisImages] = useState([]);
  const fileRef = useRef(null);
  const pendingAction = useRef(null);

  /* ── Material management ── */
  const addTextMaterial = () => {
    setMaterials(prev => [...prev, { id:uid(), description:"", photoDataUrl:null, photoBase64:null, photoMediaType:null }]);
  };

  const triggerPhotoAdd = () => {
    pendingAction.current = "add";
    fileRef.current?.click();
  };

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      const base64 = dataUrl.split(",")[1];
      setMaterials(prev => [...prev, {
        id: uid(),
        description: "",
        photoDataUrl: dataUrl,
        photoBase64: base64,
        photoMediaType: file.type,
      }]);
    };
    reader.readAsDataURL(file);
  };

  const updateMaterial = (id, updates) => setMaterials(prev => prev.map(m => m.id === id ? { ...m, ...updates } : m));
  const deleteMaterial = (id) => setMaterials(prev => prev.filter(m => m.id !== id));

  /* ── Analyse ── */
  const analyse = async () => {
    if (analysing) return;
    setAnalysing(true);
    setError(null);
    try {
      const content = [];
      let photoIndex = 0;
      for (const mat of materials) {
        if (mat.photoBase64) {
          content.push({ type:"image", source:{ type:"base64", media_type:mat.photoMediaType, data:mat.photoBase64 } });
          photoIndex++;
        }
      }
      content.push({ type:"text", text:buildPrompt(materials) });

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          messages: [{ role:"user", content }]
        })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message || "API error");
      const text = data.content.map(c => c.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setResult(parsed);
      setPhase("results");
    } catch (err) {
      setError("Couldn't analyse your materials. Check your internet connection and try again.");
    } finally {
      setAnalysing(false);
    }
  };

  const reset = () => {
    setPhase("build");
    setMaterials([]);
    setResult(null);
    setError(null);
    setViewingProject(null);
  };

  if (!splashDone) return <SplashScreen onDone={() => setSplashDone(true)}/>;

  return (
    <div style={{ fontFamily:"'Lora','Georgia',serif", background:C.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto", paddingBottom:40 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;800&family=Lora:wght@400;500;600&display=swap');
        *{box-sizing:border-box;} body{margin:0;background:#DFC88E;}
        input,textarea,select{outline:none;font-family:inherit;}
        button:active{transform:scale(0.97);}
        ::placeholder{color:#8A5C3099;}
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-thumb{background:#D4B870;border-radius:4px;}
      `}</style>

      {/* Hidden file input */}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display:"none" }} onChange={handleFileChange}/>

      {/* Header */}
      <div style={{ background:`linear-gradient(160deg,${C.leather} 0%,${C.oxblood} 100%)`, padding:"12px 18px", position:"sticky", top:0, zIndex:40, borderBottom:`1px solid ${C.burnished}44` }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <CLLogo size={40} color={C.burnished}/>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:16, fontWeight:800, color:"#FAF0D8", letterSpacing:"0.05em", textTransform:"uppercase", lineHeight:1 }}>Cernunnos</div>
            <div style={{ fontSize:8, color:`${C.burnished}CC`, letterSpacing:"0.16em", textTransform:"uppercase", fontWeight:700, marginTop:2 }}>Leatherworks · The Scrap Eye</div>
          </div>
          {phase !== "build" && (
            <button onClick={reset} style={{ border:`1px solid rgba(196,160,48,0.3)`, background:"rgba(250,240,216,0.08)", borderRadius:20, padding:"5px 12px", cursor:"pointer", fontSize:11, color:"#FAF0D8AA", fontWeight:700, fontFamily:"inherit" }}>New session</button>
          )}
        </div>
      </div>

      {/* Content */}
      <div style={{ padding:"18px 16px 0" }}>
        {phase === "build" && (
          <SessionBuilder
            materials={materials}
            onAddPhoto={triggerPhotoAdd}
            onAddText={addTextMaterial}
            onUpdate={updateMaterial}
            onDelete={deleteMaterial}
            onAnalyse={analyse}
            analysing={analysing}
          />
        )}

        {phase === "results" && !viewingProject && result && (
          <ResultsView
            result={result}
            materials={materials}
            onReset={reset}
            onViewProject={(proj, mats) => setViewingProject({ proj, mats })}
          />
        )}

        {phase === "results" && viewingProject && (
          <ProjectDetailView
            proj={viewingProject.proj}
            materialsRead={viewingProject.mats}
            onClose={() => setViewingProject(null)}
          />
        )}

        {error && (
          <div style={{ background:C.crimson+"14", border:`1px solid ${C.crimson}44`, borderRadius:12, padding:"14px 16px", marginTop:16 }}>
            <div style={{ fontSize:13, fontWeight:700, color:C.crimson, marginBottom:6 }}>Analysis failed</div>
            <div style={{ fontSize:12, color:C.bark, lineHeight:1.6, marginBottom:12 }}>{error}</div>
            <Btn small onClick={() => setError(null)} variant="secondary">Dismiss</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ScrapEye)
);
  </script>
</body>
